name: 持续集成

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - product
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: 代码检查
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 配置 Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: 配置 Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci

      - name: 构建前端
        working-directory: frontend
        run: npm run build

      - name: 检查 Go 格式
        run: test -z "$(gofmt -l $(find . -type f -name '*.go'))"

      - name: 运行 Go Vet
        run: go vet ./...

      - name: 运行测试
        run: go test -race -count=1 ./...

      - name: 构建应用
        run: go build -trimpath ./...

  docker:
    name: Docker 构建
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 验证 Docker 镜像构建
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: featherimgbed:ci
          build-args: VERSION=ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
