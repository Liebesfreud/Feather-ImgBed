name: 发布容器镜像

on:
  push:
    branches:
      - product
  release:
    types:
      - published

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: publish-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: 发布前验证
    if: github.event_name != 'release' || github.event.release.prerelease == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 校验正式 Release 来源
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "正式 Release 标签必须符合 vX.Y.Z，当前为：$RELEASE_TAG"
            exit 1
          fi
          git fetch origin product:refs/remotes/origin/product
          release_commit="$(git rev-list -n 1 "$RELEASE_TAG")"
          if ! git merge-base --is-ancestor "$release_commit" origin/product; then
            echo "Release 标签必须指向 product 分支中的提交"
            exit 1
          fi

      - name: 配置 Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: 配置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装并构建前端
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: 检查并测试后端
        run: |
          test -z "$(gofmt -l $(find . -type f -name '*.go'))"
          go vet ./...
          go test -race -count=1 ./...

  publish:
    name: 构建并推送 GHCR
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 规范化镜像名称
        id: image
        env:
          RAW_IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: echo "name=${RAW_IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: 登录 GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成镜像标签和元数据
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          flavor: latest=false
          tags: |
            type=raw,value=product,enable=${{ github.event_name == 'push' }}
            type=sha,prefix=sha-,enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
          labels: |
            org.opencontainers.image.title=Feather-ImgBed
            org.opencontainers.image.description=轻羽图床容器镜像

      - name: 配置 QEMU
        uses: docker/setup-qemu-action@v4

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 构建并推送多架构镜像
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.event.release.tag_name || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 生成镜像构建来源证明
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
